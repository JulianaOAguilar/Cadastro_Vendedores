<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-dark text-white">
      <h4 class="mb-0">Cadastro de Vendedores</h4>
    </div>

    <div class="card-body">
      <form [formGroup]="sellerForm" (ngSubmit)="save()">

        <!-- Nome -->
        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input
            type="text"
            class="form-control"
            placeholder="Digite o nome do vendedor"
            formControlName="name">
        </div>

        <!-- Sexo -->
        <div class="mb-3">
          <label class="form-label d-block">Sexo</label>

          <div class="form-check form-check-inline">
            <input
              class="form-check-input"
              type="radio"
              id="feminino"
              value="FEMALE"
              formControlName="gender">

            <label class="form-check-label" for="feminino">
              Feminino
            </label>
          </div>

          <div class="form-check form-check-inline">
            <input
              class="form-check-input"
              type="radio"
              id="masculino"
              value="MALE"
              formControlName="gender">

            <label class="form-check-label" for="masculino">
              Masculino
            </label>
          </div>
        </div>

        <!-- Salário -->
        <div class="mb-3">
          <label class="form-label">Salário</label>
          <input
            type="number"
            class="form-control"
            placeholder="Digite o salário"
            formControlName="salary">
        </div>

        <!-- Bônus -->
        <div class="mb-4">
          <label class="form-label">
            Bônus (%)
          </label>

          <input
            type="range"
            class="form-range"
            min="0"
            max="100"
            formControlName="bonus">

          <div class="text-center fw-bold">
            {{ sellerForm.get('bonus')?.value }}%
          </div>
        </div>

        <!-- Botões -->
        <div class="d-flex gap-2">
          <button
            type="submit"
            class="btn btn-success"
            [disabled]="sellerForm.invalid">
            Salvar
          </button>

          <button
            type="button"
            class="btn btn-secondary"
            (click)="sellerForm.reset({ name: '', gender: '', salary: 0, bonus: 0 })">
            Limpar
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
