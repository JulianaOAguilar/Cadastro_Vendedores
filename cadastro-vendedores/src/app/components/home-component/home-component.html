<div class="container mt-4">

  <div class="card shadow">
    <div class="card-header bg-dark text-white">
      <h4 class="mb-0">Lista de Vendedores</h4>
    </div>

    <div class="card-body">

      <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>Nome</th>
            <th>Sexo</th>
            <th>Salário</th>
            <th>Bônus (%)</th>
          </tr>
        </thead>

        <tbody>
   @for (seller of sellers(); track seller.id) {
<tr>
  <td>{{ seller.name }}</td>
  <td>{{ seller.gender }}</td>
  <td>{{ seller.salary }}</td>
  <td>{{ seller.bonus }}%</td>
</tr>
}
        </tbody>

      </table>

    </div>
  </div>

</div>
